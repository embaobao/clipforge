<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipForge Dev Paste Target</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f4;
        color: #171717;
      }

      body {
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100vw - 48px));
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: min(360px, calc(100vh - 96px));
        padding: 16px;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: white;
        color: #171717;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="clipforge-dev-paste-target">ClipForge dev paste target</label>
      <textarea id="clipforge-dev-paste-target" autofocus>ClipForge dev paste target
</textarea>
    </main>
    <script>
      window.__clipforgeDevPasteEvents = [];
      const target = document.getElementById("clipforge-dev-paste-target");
      const focusTarget = () => {
        target.focus();
        target.selectionStart = target.value.length;
        target.selectionEnd = target.value.length;
      };
      target.addEventListener("paste", () => {
        window.__clipforgeDevPasteEvents.push({ at: Date.now() });
      });
      window.addEventListener("load", focusTarget);
      window.addEventListener("focus", focusTarget);
      setTimeout(focusTarget, 120);
      setTimeout(focusTarget, 500);
    </script>
  </body>
</html>
