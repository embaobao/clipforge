name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Build and check
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Check Tauri backend
        run: cargo check
        working-directory: src-tauri

      - name: Check Rust formatting
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Run verify scripts (unit / boundaries / hot-path / file-size / i18n)
        run: pnpm test:unit && pnpm check:i18n
